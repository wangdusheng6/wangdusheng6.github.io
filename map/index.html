<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D世界地图 - 账号系统与绘图存档</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免拖动时选中文字，但输入框不影响 */
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        /* 模态框通用样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
            pointer-events: auto !important;
        }
        /* 透明边框容器 */
        .app-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;  /* 让容器不拦截任何鼠标/触摸事件 */
            z-index: 0;
        }

        /* 确保交互元素在容器上方且可点击 */
        .modal, .user-status, .tool-bar {
            pointer-events: auto;
        }
        .modal-card {
            background: #1e2a32e6;
            border-radius: 32px;
            padding: 24px 28px;
            width: 360px;
            max-width: 90%;
            color: white;
            border: 1px solid #6c8fb0;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-card h2 {
            margin-top: 0;
            text-align: center;
            color: #ffd966;
        }
        .modal-card input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            background: #2d3e4b;
            border: 1px solid #7f9cbb;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .modal-card button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .modal-card button:hover {
            background: #1f6390;
            transform: scale(0.98);
        }
        .switch-btn {
            background: transparent;
            border: 1px solid #7f9cbb;
            margin-top: 8px;
        }
        .error-msg {
            color: #ffaa88;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
        .success {
            color: #a3e4a3;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .flex-row button {
            margin-top: 0;
        }
        hr {
            border-color: #5a6e8a;
            margin: 12px 0;
        }
        .toolbar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            border-radius: 36px;
            padding: 8px 16px;
            color: #eee;
            font-size: 12px;
            z-index: 200;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .user-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #1e2a32cc;
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #ffecb3;
            z-index: 200;
            font-weight: bold;
            border: 1px solid #ffaa66;
            pointer-events: auto;
            cursor: pointer;
        }
        .logout-btn {
            margin-left: 12px;
            background: #a04141;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
        .tool-bar {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(30, 42, 50, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #6c8fb0;
            color: #eee;
            font-size: 12px;
            z-index: 200;
            max-width: 200px;
        }
        .tool-bar button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            margin: 4px 2px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
            display: inline-block;
        }
        .tool-bar button:hover {
            background: #1f6390;
        }
        .tool-bar button.active {
            background: #ffaa00;
            color: #000;
        }
        .tool-section {
            margin: 8px 0;
            padding: 6px 0;
            border-bottom: 1px solid #5a6e8a;
        }
        .tool-section:last-child {
            border-bottom: none;
        }
        .status-msg {
            color: #a3e4a3;
            font-size: 11px;
            margin-top: 8px;
            padding: 4px 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        @media (max-width:600px) {
            .modal-card { padding: 16px; width: 300px; }
            .user-status { font-size: 10px; padding: 4px 10px; top: 10px; right: 10px; }
            .tool-bar { top: 100px; left: 10px; max-width: 170px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 浮层账号面板 -->
        <div id="auth-modal" class="modal" style="display: flex;">
            <div class="modal-card" id="login-panel">
                <h2>世界地图 · 登录</h2>
                <input type="text" id="login-username" placeholder="用户名">
                <input type="password" id="login-pwd" placeholder="密码">
                <button id="do-login">登录</button>
                <button class="switch-btn" id="to-register">注册新账号</button>
                <button class="switch-btn" id="to-forgot">找回密码</button>
                <div id="login-msg" class="error-msg"></div>
            </div>
        </div>

        <div id="user-status-bar" class="user-status" style="display: none;">
            <span id="user-name-display">未登录</span>
            <button id="logout-btn" class="logout-btn">退出</button>
            <button id="change-pwd-btn" class="logout-btn" style="background:#2c5a6e;">改密</button>
            <button id="delete-account-btn" class="logout-btn" style="background:#a04141; margin-left:5px;">注销账号</button>
        </div>
        <div class="tool-bar" id="tool-bar" style="display: none;">
            <div class="tool-section">
                <div style="font-weight:bold; margin-bottom:6px;">模式</div>
                <button id="btn-mouse">鼠标</button>
                <button id="btn-draw">手绘</button>
                <button id="btn-fill">填色</button>
                <button id="btn-eraser">橡皮</button>
                
            </div>
            <div class="tool-section">
                <label style="display:flex; align-items:center; gap:6px;">颜色: <input type="color" id="color-picker" value="#ff3366" style="width:30px; height:24px; border:none; border-radius:4px; cursor:pointer;"></label>
            </div>
            <div class="tool-section">
                <div style="font-weight:bold; margin-bottom:6px;">标注工具</div>
                <button id="btn-click-select">鼠标选点</button>
                <button id="btn-clear-markers">清除</button>
                <button id="btn-reset">重置画布</button>
            </div>
            <div class="tool-section">
                <div style="font-weight:bold; margin-bottom:6px;">画笔设置</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:11px;">粗细:</span>
                    <input type="range" id="brush-size" min="2" max="30" step="1" value="8" style="flex:1;">
                    <span id="brush-size-value" style="width:30px; font-size:12px;">8px</span>
                </div>
            </div>
            <div class="status-msg" id="status-msg">第一次使用请先点击工具</div>
        </div>
    </div>

    <!-- Three.js 相关 (动态加载) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ---------- 初始化数据库 (IndexedDB 存储账号及绘图数据) ----------
        const DB_NAME = 'WorldMapDB';
        const DB_VERSION = 2;
        const USERS_STORE = 'users';
        const DRAFT_STORE = 'drafts'; // 存储用户的绘图canvas数据 (base64)

        let db = null;
        let currentUser = null;        // 存储当前登录用户对象 { id, accountId, username, wechat, passwordHash? 实际用明文简单储存为了演示, 实际应加密, 但demo展示功能 }
        let drawingCanvas = null;       // 绘图canvas上下文
        let earthMaterial = null;
        let earthMesh = null;
        let scene, camera, renderer, labelRenderer, controls;
        let markersList = [];
        let currentColor = '#ff3366';
        let brushSize = 5;  // 画笔粗细，默认5px
        // 工具模式相关变量
        let drawingEnabled = false, fillEnabled = false, eraserEnabled = false, selectMode = false, pickColorMode = false, clickToAddMarkerMode = false;
        let isDrawing = false, lastPos = null;
        let selectionPoints = [];
        
        // 等待绘图canvas初始化完成的Promise
        let drawingReady = false;
        let canvasTextureUpdateNeeded = false;
        let originalWorldImage = null;
        let texWidth = 2048, texHeight = 1024;
        let ctx = null;
        
        // ----- 数据库操作封装 -----
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const dbRef = event.target.result;
                    if (!dbRef.objectStoreNames.contains(USERS_STORE)) {
                        const userStore = dbRef.createObjectStore(USERS_STORE, { keyPath: 'accountId' });
                        userStore.createIndex('wechat', 'wechat', { unique: false });
                    }
                    if (!dbRef.objectStoreNames.contains(DRAFT_STORE)) {
                        const draftStore = dbRef.createObjectStore(DRAFT_STORE, { keyPath: 'accountId' });
                    }
                };
            });
        }
        
        // 生成10位数字ID
        function generateAccountId() {
            return Math.floor(1000000000 + Math.random() * 9000000000).toString();
        }
        
        // 注册账号
        async function registerUser(username, password, wechat) {
            if (!username || !password || !wechat) throw new Error('请填写完整信息');
            const accountId = generateAccountId();
            const user = { accountId, username, password, wechat, createTime: Date.now() };
            const tx = db.transaction([USERS_STORE], 'readwrite');
            const store = tx.objectStore(USERS_STORE);
            // 检查用户名是否已存在 (可选，简单检查重复用户名)
            const existing = await new Promise((res) => {
                const index = store.index('wechat');
                const req = index.get(wechat);
                req.onsuccess = () => res(req.result);
                req.onerror = () => res(null);
            });
            if (existing) throw new Error('该微信号已注册');
            await new Promise((res, rej) => {
                const req = store.add(user);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
            return { accountId, username, wechat };
        }
        
        // 登录验证 - 通过用户名
        async function loginByUsername(username, password) {
            const tx = db.transaction([USERS_STORE], 'readonly');
            const store = tx.objectStore(USERS_STORE);
            let user = null;
            await new Promise((res) => {
                const req = store.openCursor();
                req.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) {
                        if (cursor.value.username === username) {
                            user = cursor.value;
                            res();
                            return;
                        }
                        cursor.continue();
                    } else {
                        res();
                    }
                };
            });
            if (!user) throw new Error('账号不存在');
            if (user.password !== password) throw new Error('密码错误');
            return user;
        }
        
        // 通过微信号找回密码
        async function recoverPassword(wechat) {
            const tx = db.transaction([USERS_STORE], 'readonly');
            const store = tx.objectStore(USERS_STORE);
            const index = store.index('wechat');
            const user = await new Promise((res) => {
                const req = index.get(wechat);
                req.onsuccess = () => res(req.result);
                req.onerror = () => res(null);
            });
            if (!user) throw new Error('未找到该微信号绑定的账号');
            return user.password;
        }
        
        // 更改密码
        async function changePassword(accountId, oldPassword, newPassword) {
            const tx = db.transaction([USERS_STORE], 'readwrite');
            const store = tx.objectStore(USERS_STORE);
            const user = await new Promise((res) => {
                const req = store.get(accountId);
                req.onsuccess = () => res(req.result);
            });
            if (!user) throw new Error('账号不存在');
            if (user.password !== oldPassword) throw new Error('原密码错误');
            user.password = newPassword;
            await new Promise((res, rej) => {
                const req = store.put(user);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
            return true;
        }
        
        // 保存绘图数据 (canvas base64)
        async function saveDraft(accountId, imageDataUrl) {
            const tx = db.transaction([DRAFT_STORE], 'readwrite');
            const store = tx.objectStore(DRAFT_STORE);
            const draft = { accountId, imageDataUrl, updatedAt: Date.now() };
            await new Promise((res, rej) => {
                const req = store.put(draft);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
        }
        
        async function loadDraft(accountId) {
            const tx = db.transaction([DRAFT_STORE], 'readonly');
            const store = tx.objectStore(DRAFT_STORE);
            const draft = await new Promise((res) => {
                const req = store.get(accountId);
                req.onsuccess = () => res(req.result);
            });
            return draft ? draft.imageDataUrl : null;
        }
        
        // ---------- Three.js 地球初始化 (与绘图板集成) ----------
        async function initEarth() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.0006);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.2, 3.5);
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.rotateSpeed = 0.8;
            controls.zoomSpeed = 1.2;
            controls.maxDistance = 7;
            
            // 光照
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
            dirLight.position.set(5, 3, 5);
            scene.add(dirLight);
            const fill = new THREE.PointLight(0x88aaff, 0.3);
            fill.position.set(-2,1,3);
            scene.add(fill);
            
            // 星空
            const starGeo = new THREE.BufferGeometry();
            const starsPos = [];
            for (let i=0;i<1500;i++) { starsPos.push((Math.random()-0.5)*800,(Math.random()-0.5)*800,(Math.random()-0.5)*200-80); }
            starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos),3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.2})));
            
            // ========== 内层球体：白色底图（绘图层）==========
            const baseCanvas = document.createElement('canvas');
            baseCanvas.width = 2048;
            baseCanvas.height = 1024;
            const baseCtx = baseCanvas.getContext('2d');
            baseCtx.fillStyle = '#ffffff';
            baseCtx.fillRect(0, 0, 2048, 1024); 

            const earthGeo = new THREE.SphereGeometry(1, 200, 200);
            const drawTexture = new THREE.CanvasTexture(baseCanvas);
            earthMaterial = new THREE.MeshStandardMaterial({
                map: drawTexture,
                color: 0xffffff,
                roughness: 0.8
            });
            earthMesh = new THREE.Mesh(earthGeo, earthMaterial);
            scene.add(earthMesh);

            // ========== 外层球体：仅经纬线（透明顶层）==========
            const lineCanvas = document.createElement('canvas');
            lineCanvas.width = 2048;
            lineCanvas.height = 1024;
            const lineCtx = lineCanvas.getContext('2d');
            // 完全透明底色
            lineCtx.fillStyle = 'rgba(0,0,0,0)';
            lineCtx.fillRect(0,0,2048,1024);

            // 绘制经纬线
            lineCtx.strokeStyle = '#cccccc';
            lineCtx.lineWidth = 2;
            const step = 1024 / 12;
            for (let i=0; i<=12; i++) {
                lineCtx.beginPath();
                lineCtx.moveTo(0, i*step);
                lineCtx.lineTo(2048, i*step);
                lineCtx.stroke();
            }
            for (let i=0; i<=8; i++) {
                lineCtx.beginPath();
                lineCtx.moveTo(i*256, 0);
                lineCtx.lineTo(i*256, 1024);
                lineCtx.stroke();
            }

            const lineTexture = new THREE.CanvasTexture(lineCanvas);
            const lineMaterial = new THREE.MeshBasicMaterial({
                map: lineTexture,
                transparent: true,
                depthWrite: false
            });
            // 外层球体半径略大，保证在顶层
            const lineMesh = new THREE.Mesh(earthGeo, lineMaterial);
            lineMesh.scale.set(1.005, 1.005, 1.005);
            scene.add(lineMesh);
            // 初始化绘图Canvas - 复制拿到的政区地图
            const canvas = document.createElement('canvas');
            canvas.width = texWidth;
            canvas.height = texHeight;
            ctx = canvas.getContext('2d');
            // 将基础政区地图拷贝到绘图canvas
            ctx.drawImage(baseCanvas, 0, 0, texWidth, texHeight);
            drawingReady = true;
            const dynamicTexture = new THREE.CanvasTexture(canvas);
            dynamicTexture.magFilter = THREE.LinearFilter;
            dynamicTexture.minFilter = THREE.LinearFilter;
            earthMaterial.map = dynamicTexture;
            earthMaterial.needsUpdate = true;
            originalWorldImage = canvas;
            // 保存ctx和纹理引用到全局，便于更新
            window.drawingCtx = ctx;
            window.drawingCanvas = canvas;
            window.drawingTexture = dynamicTexture;
            
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });
            return canvas;
        }
        
        // 辅助函数: 经纬度转canvas坐标
        function latLonToCanvas(lat, lon) {
            const x = ((lon + 180) / 360) * texWidth;
            const y = ((90 - lat) / 180) * texHeight;
            return { x, y };
        }
        
        function updateTexture() {
            if (window.drawingTexture && window.drawingCanvas) {
                // 直接更新现有纹理，告诉Three.js内容已改变
                window.drawingTexture.needsUpdate = true;
                earthMaterial.needsUpdate = true;
            }
        }
        // 一键还原原始空白内层地图
        async function resetDrawingCanvas() {
                if (!ctx || !originalWorldImage) {
                console.warn('重置失败：画布或原始图像不存在');
                return;
            }
            // 清空当前画布
            ctx.clearRect(0, 0, texWidth, texHeight);
            // 重新绘制原始白色底图
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, texWidth, texHeight);
            // 更新纹理
            updateTexture();
            document.getElementById('status-msg').innerText = '画布已重置为原始白色状态';
            // 自动保存当前会话
            if (currentUser) saveCurrentSession();
        }
        
        // 绘图函数集成drawOnCanvas, floodFill... 简化复用之前的逻辑但需要引用ctx与canvas
        function drawOnCanvas(lat, lon, color, radius = brushSize, isEraser = false) {
            if (!drawingReady) return;
            const { x, y } = latLonToCanvas(lat, -lon);
            ctx.save();
            ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI*2);
            if (isEraser) {ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#ffffff';}
            else ctx.fillStyle = color;
            ctx.fill();
            ctx.restore();
            updateTexture();
        }
        
        // 实现填色 (简易版)
        function floodFill(lat, lon, fillColor) {
            if (!drawingReady) return;
            const { x, y } = latLonToCanvas(lat, -lon);
            const ix = Math.floor(x), iy = Math.floor(y);
            const imageData = ctx.getImageData(0,0,texWidth,texHeight);
            const data = imageData.data;
            const targetPos = (iy*texWidth + ix)*4;
            const targetR = data[targetPos], targetG= data[targetPos+1], targetB=data[targetPos+2];
            const fillRGB = hexToRgb(fillColor);
            const stack = [{x:ix, y:iy}];
            const visited = new Set();
            while(stack.length) {
                const {x:cx, y:cy} = stack.pop();
                const key = `${cx},${cy}`;
                if (cx<0 || cx>=texWidth || cy<0 || cy>=texHeight) continue;
                if (visited.has(key)) continue;
                const idx = (cy*texWidth + cx)*4;
                if (Math.abs(data[idx]-targetR)<5 && Math.abs(data[idx+1]-targetG)<5 && Math.abs(data[idx+2]-targetB)<5) {
                    data[idx]=fillRGB.r; data[idx+1]=fillRGB.g; data[idx+2]=fillRGB.b;
                    visited.add(key);
                    stack.push({x:cx+1,y:cy},{x:cx-1,y:cy},{x:cx,y:cy+1},{x:cx,y:cy-1});
                }
            }
            ctx.putImageData(imageData,0,0);
            updateTexture();
        }
        function hexToRgb(hex) { return {r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16)}; }
        
        // 标注相关
        function addMarker(lat, lon, name) {
            const div = document.createElement('div');
            div.textContent = `${name} (${lat.toFixed(2)}, ${lon.toFixed(2)})`;
            div.style.cssText = 'background:#1e2a3aee; color:#ffdd99; padding:4px 12px; border-radius:30px; border:1px solid #ffaa66; font-size:13px; backdrop-filter:blur(4px); white-space:nowrap;';
            const labelObj = new CSS2DObject(div);
            const radius = 1.02;
            const phi = (90 - lat) * Math.PI/180;
            const theta = lon * Math.PI/180;
            labelObj.position.set(radius*Math.sin(phi)*Math.cos(theta), radius*Math.cos(phi), radius*Math.sin(phi)*Math.sin(theta));
            scene.add(labelObj);
            markersList.push({label:labelObj, lat, lon, name});
            return labelObj;
        }
        function clearMarkers() { markersList.forEach(m => scene.remove(m.label)); markersList = []; }
        
        // 射线拾取经纬度（修复上下颠倒问题）
        function getLatLonFromMouse(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(earthMesh);
            
            if (intersects.length) {
                const p = intersects[0].point;
                // 标准化坐标（确保球体半径=1，不影响计算）
                p.normalize();

                // 正确纬度计算（修复上下颠倒）
                const lat = Math.asin(p.y) * 180 / Math.PI; 
                // 标准经度计算
                const lon = Math.atan2(p.z, p.x) * 180 / Math.PI;

                return { lat, lon };
            }
            return null;
        }
                
        // 加载用户存档 (标注和图片)
        async function loadUserData(user) {
            clearMarkers();
            const draftData = await loadDraft(user.accountId);
            if(draftData) {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0,0,texWidth,texHeight);
                    ctx.drawImage(img,0,0,texWidth,texHeight);
                    updateTexture();
                };
                img.src = draftData;
            } else {
                // 重置默认地图
                if(originalWorldImage) ctx.drawImage(originalWorldImage,0,0);
                updateTexture();
            }
            // 加载标注 (自定义标注需单独存储，简易演示仅存储绘图，标注单独存储于另一个store 但为了完整演示单独加标注存储)
            // 这里简化: 不清空额外标注，可下次再扩展。为了体验，会存储标注到drafts的扩展字段 (实际可新增store)
            // 为了满足要求，额外标注我们用 localStorage+账号? 更好: 存数据库的另一个store。快速实现标注存储
            const markersData = await loadMarkers(user.accountId);
            if(markersData) markersData.forEach(m => addMarker(m.lat, m.lon, m.name));
        }
        async function saveMarkers(accountId, markers) {
            const tx = db.transaction(['markers'], 'readwrite');
            if(!db.objectStoreNames.contains('markers')) return;
            const store = tx.objectStore('markers');
            await store.put({accountId, markers});
        }
        async function loadMarkers(accountId) {
            if(!db.objectStoreNames.contains('markers')) return [];
            const tx = db.transaction(['markers'], 'readonly');
            const store = tx.objectStore('markers');
            const res = await new Promise(res => { const req = store.get(accountId); req.onsuccess=()=>res(req.result); });
            return res ? res.markers : [];
        }
        // 升级数据库保证有markers
        function upgradeDB() {
            if(db && !db.objectStoreNames.contains('markers')) {
                const newStore = db.createObjectStore('markers', { keyPath: 'accountId' });
            }
        }
        
        // 保存当前所有标注及绘图快照
        async function saveCurrentSession() {
            if(!currentUser) return;
            const canvas = window.drawingCanvas;
            const imageData = canvas.toDataURL();
            await saveDraft(currentUser.accountId, imageData);
            // 储存标注 (简单存)
            const markersSimple = markersList.map(m => ({lat: m.lat, lon: m.lon, name: m.name}));
            if(db.objectStoreNames.contains('markers')) {
                const tx = db.transaction(['markers'], 'readwrite');
                const store = tx.objectStore('markers');
                await store.put({accountId: currentUser.accountId, markers: markersSimple});
            }
        }
        
        // UI事件绑定，绘图模式钩子
        
        // 暴露全局工具调用接口
        window.toolManager = { currentColor, getLatLonFromMouse, drawOnCanvas, floodFill, addMarker, saveCurrentSession, clearMarkers };
        
        // 启动应用
        async function startup() {
            await openDB();
            if(db && !db.objectStoreNames.contains('markers')) {
                // 动态创建新版暂时不管，因为升级需要在open里面处理，但我们可以忽略，为了演示暂时标注存储非必须，核心绘图存档OK
            }
            try {
                await initEarth();
            } catch(err) {
                console.error('地球初始化失败:', err);
            }
            // 界面控制器事件绑定...
            document.getElementById('do-login').onclick = async () => {
                const username = document.getElementById('login-username').value.trim();
                const pwd = document.getElementById('login-pwd').value;
                try {
                    const user = await loginByUsername(username, pwd);
                    currentUser = user;
                    document.getElementById('auth-modal').style.display = 'none';
                    document.getElementById('user-status-bar').style.display = 'flex';
                    document.getElementById('tool-bar').style.display = 'block';
                    document.getElementById('user-name-display').innerText = ` ${user.username} (${user.accountId})`;
                    await loadUserData(user);
                    if (window.showToolBar) window.showToolBar();
                } catch(e) { document.getElementById('login-msg').innerText = e.message; }
            };
            document.getElementById('to-register').onclick = () => showRegister();
            document.getElementById('to-forgot').onclick = () => showForgot();
            document.getElementById('logout-btn').onclick = async () => { await saveCurrentSession(); currentUser=null; location.reload(); };
            document.getElementById('change-pwd-btn').onclick = () => showChangePwd();
            document.getElementById('delete-account-btn').onclick = () => deleteAccount();
            
            // 图形工具按钮 (从之前设计复用部分)
            attachToolEvents();
            // 自动存档定时器
            setInterval(() => { if(currentUser) saveCurrentSession(); }, 30000);
        }
        
        function showRegister() {
            const panel = document.getElementById('login-panel');
            panel.innerHTML = `<h2> 注册新账号</h2><input id="reg-name" placeholder="昵称"><input id="reg-pwd" type="password" placeholder="密码"><input id="reg-wechat" placeholder="微信号"><button id="do-reg">注册</button><button class="switch-btn" id="back-login">返回登录</button><div id="reg-msg" class="error-msg"></div>`;
            document.getElementById('do-reg').onclick = async () => {
                const name=document.getElementById('reg-name').value, pwd=document.getElementById('reg-pwd').value, wechat=document.getElementById('reg-wechat').value;
                try {
                    const res = await registerUser(name,pwd,wechat);
                    alert(`注册成功！账号ID: ${res.accountId}\n请牢记账号ID`);
                    location.reload();
                } catch(e) { document.getElementById('reg-msg').innerText=e.message; }
            };
            document.getElementById('back-login').onclick = () => location.reload();
        }
        function showForgot() {
            const panel = document.getElementById('login-panel');
            panel.innerHTML = `<h2> 找回密码</h2><input id="forgot-wechat" placeholder="绑定微信号"><button id="do-recover">获取密码</button><button class="switch-btn" id="back-login2">返回登录</button><div id="recover-msg" class="error-msg"></div>`;
            document.getElementById('do-recover').onclick = async () => {
                const wechat=document.getElementById('forgot-wechat').value;
                try {
                    const pwd = await recoverPassword(wechat);
                    document.getElementById('recover-msg').innerHTML = `<span class="success">您的密码: ${pwd}</span>`;
                } catch(e) { document.getElementById('recover-msg').innerText=e.message; }
            };
            document.getElementById('back-login2').onclick = () => location.reload();
        }
        function showChangePwd() {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `<div class="modal-card"><h2>修改密码</h2><input id="old-pwd" type="password" placeholder="原密码"><input id="new-pwd" type="password" placeholder="新密码"><button id="confirm-change">确认修改</button><button id="cancel-change">取消</button><div id="change-msg"></div></div>`;
            document.body.appendChild(modalDiv);
            document.getElementById('confirm-change').onclick = async () => {
                const oldPwd = document.getElementById('old-pwd').value;
                const newPwd = document.getElementById('new-pwd').value;
                try {
                    await changePassword(currentUser.accountId, oldPwd, newPwd);
                    alert('密码修改成功，请重新登录');
                    await saveCurrentSession();
                    location.reload();
                } catch(e) { document.getElementById('change-msg').innerText = e.message; }
            };
            document.getElementById('cancel-change').onclick = () => modalDiv.remove();
        }

        let mouseMode = true; // 初始为鼠标模式
        
        // 注销账号（永久删除）
        async function deleteAccount() {
            if (!currentUser) return;
            
            // 二次确认
            const confirm1 = confirm(`警告：您确定要永久删除账号 "${currentUser.username}" 吗？\n删除后将无法恢复，所有绘图和标注数据都会丢失！`);
            if (!confirm1) return;
            
            const confirm2 = confirm(`请再次确认：输入您的密码以删除账号`);
            if (!confirm2) return;
            
            const password = prompt('请输入密码以确认删除账号：');
            if (!password) {
                alert('密码错误，注销已取消');
                return;
            }
            
            // 验证密码
            if (password !== currentUser.password) {
                alert('密码错误，注销已取消');
                return;
            }
            
            try {
                // 删除用户数据
                const tx = db.transaction([USERS_STORE, DRAFT_STORE], 'readwrite');
                
                // 删除用户信息
                const userStore = tx.objectStore(USERS_STORE);
                await new Promise((res, rej) => {
                    const req = userStore.delete(currentUser.accountId);
                    req.onsuccess = () => res();
                    req.onerror = () => rej(req.error);
                });
                
                // 删除绘图存档
                const draftStore = tx.objectStore(DRAFT_STORE);
                await new Promise((res, rej) => {
                    const req = draftStore.delete(currentUser.accountId);
                    req.onsuccess = () => res();
                    req.onerror = () => rej(req.error);
                });
                
                // 删除标注（如果有 markers 存储库）
                if (db.objectStoreNames.contains('markers')) {
                    const markerStore = tx.objectStore('markers');
                    await new Promise((res, rej) => {
                        const req = markerStore.delete(currentUser.accountId);
                        req.onsuccess = () => res();
                        req.onerror = () => rej(req.error);
                    });
                }
                
                alert('账号已成功注销！');
                // 清空当前用户并刷新页面
                currentUser = null;
                location.reload();
                
            } catch(e) {
                console.error('注销失败:', e);
                alert('注销失败：' + e.message);
            }
        }
        function resetToolModes() {
            drawingEnabled = false; fillEnabled = false; eraserEnabled = false; clickToAddMarkerMode = false;
            document.getElementById('btn-draw').classList.remove('active');
            document.getElementById('btn-fill').classList.remove('active');
            document.getElementById('btn-eraser').classList.remove('active');
            document.getElementById('btn-click-select').classList.remove('active');
            document.getElementById('btn-mouse').classList.remove('active');
            document.body.style.cursor = 'default';
        }
        
        function setMouseMode() {
            resetToolModes();
            mouseMode = true;
            controls.enabled = true;
            document.getElementById('btn-mouse').classList.add('active');
            document.getElementById('status-msg').innerText = '鼠标模式: 拖动并旋转地球';
        }
        
        function setDrawingMode(mode) {
            resetToolModes();
            mouseMode = false;
            controls.enabled = false;
            
            if (mode === 'draw') {
                drawingEnabled = true;
                document.getElementById('btn-draw').classList.add('active');
                document.getElementById('status-msg').innerText = '手绘模式: 按住鼠标左键按住拖动';
            } else if (mode === 'fill') {
                fillEnabled = true;
                document.getElementById('btn-fill').classList.add('active');
                document.getElementById('status-msg').innerText = '填色模式: 点击区域填充当前颜色';
            } else if (mode === 'eraser') {
                eraserEnabled = true;
                document.getElementById('btn-eraser').classList.add('active');
                document.getElementById('status-msg').innerText = '橡皮擦模式: 擦除涂鸦不分窗口内容';
            } else if (mode === 'marker') {
                clickToAddMarkerMode = true;
                document.getElementById('btn-click-select').classList.add('active');
                document.getElementById('status-msg').innerText = '符标模式: 点击地图添加标注';
            }
        }
        
        function attachToolEvents() {
            const toolBar = document.getElementById('tool-bar');
            const statusMsg = document.getElementById('status-msg');
            const colorPicker = document.getElementById('color-picker');
            const btnMouse = document.getElementById('btn-mouse');
            const btnDraw = document.getElementById('btn-draw');
            const btnFill = document.getElementById('btn-fill');
            const btnEraser = document.getElementById('btn-eraser');
            const btnClickSelect = document.getElementById('btn-click-select');
            const btnClearMarkers = document.getElementById('btn-clear-markers');
            
            // 登录后显示工具栏，并初始化为鼠标模式
            window.showToolBar = () => { 
                toolBar.style.display = 'block'; 
                setMouseMode(); 
                document.getElementById('btn-reset').onclick = resetDrawingCanvas;
            };
            window.hideToolBar = () => { toolBar.style.display = 'none'; };
            
            // 工具按钮点击事件
            btnMouse.onclick = () => setMouseMode();
            btnDraw.onclick = () => setDrawingMode('draw');
            btnFill.onclick = () => setDrawingMode('fill');
            btnEraser.onclick = () => setDrawingMode('eraser');
            btnClickSelect.onclick = () => setDrawingMode('marker');
            
            btnClearMarkers.onclick = () => {
                clearMarkers();
                document.getElementById('status-msg').innerText = '已清除所有标注';
            };
            
            colorPicker.oninput = (e) => {
                currentColor = e.target.value;
                document.getElementById('status-msg').innerText = `颜色已改变: ${currentColor}`;
            };
            const brushSizeSlider = document.getElementById('brush-size');
            const brushSizeValue = document.getElementById('brush-size-value');

            if (brushSizeSlider) {
                brushSizeSlider.oninput = (e) => {
                    brushSize = parseInt(e.target.value);
                    brushSizeValue.innerText = brushSize + 'px';
                    document.getElementById('status-msg').innerText = `画笔粗细已改为: ${brushSize}px`;
                };
            }
            
            // 地球鼠标事件
            let isDrawing = false, lastPos = null;
            renderer.domElement.addEventListener('mousedown', (e) => {
                if (!currentUser || mouseMode) return;  // 鼠标模式下不处理绘图
                const result = getLatLonFromMouse(e);
                if (!result) return;
                const { lat, lon } = result;
                
                if (drawingEnabled) {
                    isDrawing = true;
                    drawOnCanvas(lat, lon, currentColor, brushSize, false);
                    lastPos = { lat, lon };
                } else if (fillEnabled) {
                    floodFill(lat, lon, currentColor);
                    document.getElementById('status-msg').innerText = '填色完成';
                } else if (eraserEnabled) {
                    isDrawing = true;
                    drawOnCanvas(lat, lon, '#000000', brushSize, true);
                    lastPos = { lat, lon };
                } else if (clickToAddMarkerMode) {
                    const defaultName = `地点`;
                    const customName = prompt('请输入标注名称:', defaultName);
                    let finalName;
                    if (customName === null) {
                        // 用户点击取消
                        document.getElementById('status-msg').innerText = '已取消添加标注';
                        return;
                    } else if (customName.trim() === '') {
                        finalName = defaultName;
                    } else {
                        finalName = customName;
                    }
                    addMarker(lat, lon, finalName);
                    document.getElementById('status-msg').innerText = `已添加标注: ${finalName} (${lat.toFixed(2)}, ${lon.toFixed(2)})`;
                    // 不退出标注模式，可以继续添加
                }
            });
            
            renderer.domElement.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                if (drawingEnabled || eraserEnabled) {
                    const result = getLatLonFromMouse(e);
                    if (result && lastPos) {
                        const { lat, lon } = result;
                        const steps = 5;
                        for (let i = 1; i <= steps; i++) {
                            const t = i / steps;
                            const interpLat = lastPos.lat + (lat - lastPos.lat) * t;
                            const interpLon = lastPos.lon + (lon - lastPos.lon) * t;
                            drawOnCanvas(interpLat, interpLon, eraserEnabled ? '#000' : currentColor, brushSize, eraserEnabled);
                        }
                        lastPos = { lat, lon };
                    }
                }
            });
            
            window.addEventListener('mouseup', () => { isDrawing = false; lastPos = null; });
        }
        
        startup();
    </script>
